<!doctype html>
<html lang="pt" data-a5-status="loading">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<base href="../">
<title>A5 — contact sheet da Arte v2</title>
<style>
  html,body{margin:0;background:#17130f;color:#eadfc8;font:12px ui-monospace,Consolas,monospace}
  canvas{display:block;width:1600px;height:auto;image-rendering:pixelated}
  #estado{position:fixed;right:8px;top:8px;padding:5px 8px;background:#111c;border:1px solid #765;z-index:2}
  html[data-a5-status="ready"] #estado{color:#9ed18c} html[data-a5-status="error"] #estado{color:#ef7770}
</style>
</head>
<body>
<div id="estado">A5: a carregar…</div>
<canvas id="canvas" width="1600" height="3600"></canvas>
<script src="tests/a5.js"></script>
<script src="js/sprites.js"></script>
<script>
'use strict';
const cv=document.getElementById('canvas'), c=cv.getContext('2d');
const estadoEl=document.getElementById('estado');
c.imageSmoothingEnabled=false;

function carregarImagem(src){
  return new Promise((resolve,reject)=>{
    const img=new Image(); img.onload=()=>resolve(img); img.onerror=()=>reject(new Error('Falhou '+src)); img.src=src;
  });
}
function fundo(x,y,w,h){
  c.fillStyle='#211b15';c.fillRect(x,y,w,h);
  c.fillStyle='#28221b';for(let yy=y;yy<y+h;yy+=16)for(let xx=x;xx<x+w;xx+=16)if(((xx-x)/16+(yy-y)/16)%2)c.fillRect(xx,yy,16,16);
}
function titulo(txt,y){ c.fillStyle='#d8c49b';c.font='bold 16px ui-monospace,monospace';c.fillText(txt,16,y); }

async function montar(){
  const metaOk=await SPR.metaPromessa;
  const meta=SPR.meta();
  if(!metaOk||!meta) throw new Error('sprites-meta.json não carregou');
  const nomes=Object.keys(meta.sheets);
  if(nomes.length!==126) throw new Error(`META: ${nomes.length}/126 sheets`);
  const carregou=await SPR.esperar(nomes,20000);
  if(!carregou){
    const falta=nomes.filter(n=>!SPR.ok(n)); throw new Error('Sheets em falta: '+falta.slice(0,8).join(', '));
  }

  const cols=4, cardW=392, cardH=88, linhas=Math.ceil(nomes.length/cols);
  const ySheets=42, yHerois=ySheets+linhas*cardH+54;
  const classes=['guerreiro','mago','batedor','assassino','paladino'];
  const herois=classes.flatMap(cl=>['heroi_'+cl,'heroi_'+cl+'2']);
  const estadosHeroi=['idle','walk','attack','skill'];
  for(const base of herois) for(const estado of estadosHeroi)
    if(!meta.sheets[base+'_'+estado]) throw new Error('Herói em falta: '+base+'_'+estado);
  const heroCardH=126, yIcons=yHerois+herois.length*heroCardH+42;
  const iconNames=Object.keys(meta.icons), texNames=Object.keys(meta.textures);
  const iconImgs=await Promise.all(iconNames.map(n=>carregarImagem('assets/2d/'+meta.icons[n].file)));
  const texImgs=await Promise.all(texNames.map(n=>carregarImagem('assets/2d/'+meta.textures[n].file)));
  const iconRows=Math.ceil(iconNames.length/12), yTex=yIcons+iconRows*86+42;
  cv.height=yTex+2*154+56;
  c.imageSmoothingEnabled=false;

  c.fillStyle='#17130f';c.fillRect(0,0,cv.width,cv.height);
  titulo('PERSONAGENS — 126 sheets · idle / walk / attack / skill / hurt / death · *_proj = projéteis',24);
  nomes.forEach((nome,i)=>{
    const col=i%cols,row=Math.floor(i/cols),x=8+col*cardW,y=ySheets+row*cardH;
    const sp=meta.sheets[nome],o=SPR.reg[nome],size=62;
    fundo(x,y,cardW-8,cardH-4);
    c.fillStyle='#eadfc8';c.font='11px ui-monospace,monospace';c.fillText(`${nome} · ${sp.frames}f`,x+6,y+13);
    for(let f=0;f<sp.frames;f++) c.drawImage(o.img,f*sp.cell.w,0,sp.cell.w,sp.cell.h,x+6+f*(size+4),y+19,size,size);
  });

  titulo('WATCHER — 10 aparências · esquerda/direita · idle / walk / attack / skill',yHerois-14);
  herois.forEach((base,linha)=>{
    const y=yHerois+linha*heroCardH;
    fundo(8,y,1584,heroCardH-6);
    c.fillStyle='#eadfc8';c.font='bold 13px ui-monospace,monospace';c.fillText(base.replace('heroi_',''),18,y+25);
    estadosHeroi.forEach((estado,col)=>{
      const nome=base+'_'+estado,sp=meta.sheets[nome],o=SPR.reg[nome];
      const f=Math.min(sp.frames-1,Math.max(0,Math.floor(sp.frames*.65)));
      const gx=210+col*342;
      c.fillStyle='#cdbb99';c.font='11px ui-monospace,monospace';c.fillText(estado,gx,y+20);
      for(const [dx,flip,rotulo] of [[68,false,'←'],[180,true,'→']]){
        c.fillStyle='#9f8e72';c.fillText(rotulo,gx+dx-4,y+38);
        c.save();c.translate(gx+dx,y+108);c.scale(flip?-1:1,1);
        c.drawImage(o.img,f*sp.cell.w,0,sp.cell.w,sp.cell.h,-38,-76,76,76);
        c.restore();
      }
    });
  });
  document.documentElement.dataset.a5Herois=String(herois.length);

  titulo('ÍCONES — 48 recortes',yIcons-12);
  iconNames.forEach((nome,i)=>{
    const col=i%12,row=Math.floor(i/12),x=12+col*132,y=yIcons+row*86;
    fundo(x,y,124,80); c.drawImage(iconImgs[i],x+4,y+3,58,58);
    c.fillStyle='#cdbb99';c.font='9px ui-monospace,monospace';c.fillText(nome.replace('icon_',''),x+3,y+74);
  });

  titulo('TEXTURAS — 16 · 07 grelha · 08 veneno · 09 portal · 12/14 variantes',yTex-12);
  texNames.forEach((nome,i)=>{
    const col=i%8,row=Math.floor(i/8),x=12+col*196,y=yTex+row*154;
    c.drawImage(texImgs[i],x,y,142,142);c.fillStyle='#eadfc8';c.font='11px ui-monospace,monospace';c.fillText(nome,x+146,y+18);
  });
  estadoEl.textContent=`A5 pronto · ${nomes.length} sheets · ${iconNames.length} ícones · ${texNames.length} texturas`;
  await a5Ready({sheets:nomes.length,heroAppearances:herois.length,heroStates:estadosHeroi.length,
                 heroDirections:2,icons:iconNames.length,textures:texNames.length,height:cv.height});
}
montar().catch(e=>{ estadoEl.textContent='A5 erro: '+e.message; a5Fail(e.message); });
</script>
</body>
</html>
