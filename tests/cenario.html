<!doctype html>
<html lang="pt" data-a5-status="loading">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<base href="../">
<title>A5 — cenário Arte v2</title>
<style>
  html,body{margin:0;height:100%;background:#0c0a10;overflow:hidden}
  canvas{display:block;width:100%;height:100%;image-rendering:pixelated}
  #dica{position:fixed;top:8px;left:10px;color:#e0d6c4;background:#111a;padding:4px 6px;font:12px ui-monospace,monospace;pointer-events:none}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="dica">A5 cenário</div>
<script src="tests/a5.js"></script>
<script src="js/balance.js"></script>
<script src="js/audio.js"></script>
<script src="js/data.js"></script>
<script src="js/art.js"></script>
<script src="js/sprites.js"></script>
<script src="js/powers.js"></script>
<script src="js/classes.js"></script>
<script src="js/arvore.js"></script>
<script src="js/game.js"></script>
<script>
/* combat.js liga o HUD do jogo; no laboratório os controlos ausentes são mudos. */
const _get=document.getElementById.bind(document);
document.getElementById=id=>_get(id)||{
  addEventListener(){},style:{},textContent:'',innerHTML:'',hidden:false,
  classList:{add(){},remove(){},toggle(){},contains(){return false;}},
  querySelector(){return null;},querySelectorAll(){return[];},
};
</script>
<script src="js/combat.js"></script>
<script>
'use strict';
const qs=new URLSearchParams(location.search);
function inteiro(nome,padrao,min,max){
  const valor=qs.get(nome); if(valor===null)return padrao;
  const n=Number(valor); return Number.isInteger(n)?Math.max(min,Math.min(max,n)):padrao;
}
let bioma=inteiro('bioma',0,0,MASMORRAS.length-1);
const sala=inteiro('sala',1,1,99), seed=inteiro('seed',123,0,2147483647);
const tempo=Number.isFinite(Number(qs.get('tempo')))?Number(qs.get('tempo')):0;
const estatico=qs.get('static')==='1', loopHeadless=qs.get('loop')==='1', provacao=qs.get('provacao')==='1';
let rafTeste=0;

function montar(){
  const w=innerWidth,h=innerHeight,dpr=Math.min(devicePixelRatio||1,2);
  canvas.width=Math.ceil(w*dpr);canvas.height=Math.ceil(h*dpr);
  canvas.style.width=w+'px';canvas.style.height=h+'px';ctx.setTransform(dpr,0,0,dpr,0,0);
  const masmorra={...MASMORRAS[bioma]}; if(provacao)masmorra.despertar=true;
  C={W:w,H:h,chaoTopo:h*0.36,chaoFundo:h*0.90,sala,seedCenario:seed,
     masmorra,tempo,particulas:[],pocas:[],orbes:[],aneisBoss:[]};
  prerenderCenario();
}
function desenharTeste(t){
  if(!estatico)C.tempo=t/1000;
  ctx.setTransform(Math.min(devicePixelRatio||1,2),0,0,Math.min(devicePixelRatio||1,2),0,0);
  desenharCenario();
  ctx.fillStyle='rgba(255,255,255,.92)';ctx.font='13px ui-monospace,monospace';ctx.textAlign='left';
  ctx.fillText(`${C.masmorra.rank} — ${C.masmorra.nome} · sala ${C.sala} · seed ${C.seedCenario}${provacao?' · PROVAÇÃO':''}`,10,C.H-10);
  if(!estatico||loopHeadless)rafTeste=requestAnimationFrame(desenharTeste);
}
async function iniciar(){
  const tx=MASMORRAS[bioma].tex||{};
  const nomes=[tx.parede,tx.chao,'hig_parede','hig_chao_pedra','hig_chao_madeira','hig_barril','hig_tocha',
    ARTE_CENARIO.varianteParede,ARTE_CENARIO.varianteChao,ARTE_CENARIO.grelha,
    ARTE_CENARIO.pocaVenenosa,ARTE_CENARIO.portalProvacao].filter(Boolean);
  await SPR.metaPromessa;
  if(!await SPR.esperar(nomes,15000))throw new Error('Texturas em falta: '+nomes.filter(n=>!SPR.ok(n)).join(', '));
  montar();
  if(estatico){
    // Três frames com o mesmo tempo: força a rasterização no Chrome headless
    // sem introduzir variação na imagem usada pelo teste de seed.
    for(let i=0;i<3;i++){
      await new Promise(resolve=>setTimeout(resolve,16));
      desenharTeste(tempo*1000);
    }
  } else desenharTeste(tempo*1000);
  document.getElementById('dica').textContent=`A5 pronto · bioma=${bioma} sala=${sala} seed=${seed}`;
  await a5Ready({bioma,sala,seed,tempo,static:estatico,loopHeadless,provacao,dpr:Math.min(devicePixelRatio||1,2)});
}
canvas.addEventListener('pointerdown',()=>{if(estatico)return;bioma=(bioma+1)%MASMORRAS.length;montar();});
addEventListener('resize',()=>{cancelAnimationFrame(rafTeste);montar();desenharTeste(performance.now());});
iniciar().catch(e=>a5Fail(e.message));
</script>
</body>
</html>
