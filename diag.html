<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico 3D — Vigília</title>
<style>
  body{margin:0;font-family:system-ui,sans-serif;background:#161210;color:#e8dcc3}
  #log{padding:14px;font-size:15px;line-height:1.7}
  .ok{color:#7da33c;font-weight:bold}
  .erro{color:#ff6a5a;font-weight:bold}
  .info{color:#a3937a}
  canvas{display:block;width:100%;height:45vh;background:#0a0a0a}
  h1{font-size:18px;padding:14px 14px 0}
</style>
</head>
<body>
<h1>Diagnóstico 3D</h1>
<div id="log"></div>
<canvas id="cv"></canvas>

<script type="importmap">
{ "imports": { "three": "./lib/three.module.js", "three/addons/": "./lib/jsm/" } }
</script>
<script type="module">
const log = document.getElementById('log');
function di(msg, cls){ const d=document.createElement('div'); d.className=cls||'info'; d.textContent=msg; log.appendChild(d); }
window.addEventListener('error', e=> di('ERRO GLOBAL: '+e.message, 'erro'));

di('1. A iniciar módulo…');
let THREE, GLTFLoader;
try {
  THREE = await import('three');
  di('2. three.js importado ✓ (r'+THREE.REVISION+')', 'ok');
} catch(e){ di('2. FALHOU import three: '+e.message, 'erro'); }

try {
  ({ GLTFLoader } = await import('three/addons/loaders/GLTFLoader.js'));
  di('3. GLTFLoader importado ✓', 'ok');
} catch(e){ di('3. FALHOU GLTFLoader: '+e.message, 'erro'); }

let renderer, cena, cam;
try {
  const cv = document.getElementById('cv');
  renderer = new THREE.WebGLRenderer({ canvas:cv, antialias:true });
  renderer.setSize(cv.clientWidth, cv.clientHeight, false);
  di('4. WebGL renderer criado ✓', 'ok');
} catch(e){ di('4. FALHOU WebGL (o teu dispositivo/navegador pode não suportar): '+e.message, 'erro'); }

if(renderer){
  cena = new THREE.Scene();
  cena.background = new THREE.Color(0x223344);
  cam = new THREE.PerspectiveCamera(50, 1.8, 0.1, 100);
  cam.position.set(0, 2.2, 4);
  cam.lookAt(0, 1, 0);
  cena.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.2));
  const dir = new THREE.DirectionalLight(0xffffff, 1.5); dir.position.set(3,5,4); cena.add(dir);

  try {
    di('5. A descarregar Knight.glb…');
    const loader = new GLTFLoader();
    const g = await loader.loadAsync('assets/chars/Knight.glb');
    cena.add(g.scene);
    di('6. Modelo Knight carregado ✓ — deves ver um cavaleiro a rodar em baixo', 'ok');
    let r=0;
    function loop(){ requestAnimationFrame(loop); r+=0.01; g.scene.rotation.y=r; renderer.render(cena,cam); }
    loop();
    di('TUDO OK — o 3D funciona neste dispositivo. O problema no jogo é a CACHE.', 'ok');
  } catch(e){ di('6. FALHOU carregar modelo: '+e.message, 'erro'); }
}
</script>
</body>
</html>
